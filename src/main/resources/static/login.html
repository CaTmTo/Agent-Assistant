<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#F7F9FC" />
    <title>Astra AI - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,500&family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;1,14..32,400&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Noto Sans SC', Inter, sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        background:
          radial-gradient(circle at 30% 20%, rgba(255, 255, 255, 0.34), transparent 34%),
          linear-gradient(135deg, #d5e8fb 0%, #d9e6f7 46%, #e7ecf8 100%);
      }

      #auth-container {
        width: 100%;
        max-width: 420px;
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(25px);
        border-radius: 20px;
        padding: 40px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.5);
      }

      .auth-header {
        text-align: center;
        margin-bottom: 32px;
      }

      .auth-header h1 {
        font-size: 28px;
        font-weight: 700;
        color: #1A1A1A;
        margin-bottom: 8px;
      }

      .auth-header p {
        font-size: 14px;
        color: #6B7280;
      }

      .tabs {
        display: flex;
        margin-bottom: 24px;
        background: rgba(0, 0, 0, 0.05);
        border-radius: 12px;
        padding: 4px;
      }

      .tab {
        flex: 1;
        text-align: center;
        padding: 12px;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s ease;
        color: #6B7280;
      }

      .tab.active {
        background: #FFFFFF;
        color: #1A1A1A;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
        font-weight: 500;
        color: #1A1A1A;
        margin-bottom: 8px;
      }

      .form-group label svg {
        width: 18px;
        height: 18px;
      }

      .form-group input {
        width: 100%;
        padding: 14px 16px;
        border: 1.5px solid rgba(0, 0, 0, 0.1);
        border-radius: 12px;
        font-size: 14px;
        font-family: inherit;
        background: rgba(255, 255, 255, 0.8);
        color: #1A1A1A;
        transition: all 0.2s ease;
      }

      .form-group input:focus {
        outline: none;
        border-color: rgba(66, 153, 225, 0.5);
        box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.1);
      }

      .form-group input::placeholder {
        color: #9CA3AF;
      }

      .submit-btn {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #4299E1 0%, #3182CE 100%);
        color: #FFFFFF;
        border: none;
        border-radius: 12px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .submit-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(66, 153, 225, 0.3);
      }

      .submit-btn:active {
        transform: translateY(0);
      }

      .error-message {
        margin-top: 16px;
        padding: 12px 16px;
        background: rgba(239, 68, 68, 0.1);
        border-radius: 8px;
        color: #DC2626;
        font-size: 13px;
        text-align: center;
        display: none;
      }

      .error-message.show {
        display: block;
      }

      .divider {
        margin: 24px 0;
        text-align: center;
        position: relative;
      }

      .divider::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 0;
        right: 0;
        height: 1px;
        background: rgba(0, 0, 0, 0.1);
        transform: translateY(-50%);
      }

      .divider span {
        background: rgba(255, 255, 255, 0.7);
        padding: 0 16px;
        position: relative;
        z-index: 1;
        color: #6B7280;
        font-size: 13px;
      }

      .switch-link {
        text-align: center;
        margin-top: 16px;
        font-size: 14px;
        color: #6B7280;
      }

      .switch-link a {
        color: #4299E1;
        font-weight: 500;
        text-decoration: none;
      }

      .switch-link a:hover {
        text-decoration: underline;
      }

      .forgot-password {
        text-align: right;
        margin-bottom: 16px;
        font-size: 13px;
      }

      .forgot-password a {
        color: #4299E1;
        text-decoration: none;
      }

      .forgot-password a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div id="auth-container">
      <div class="auth-header">
        <h1>Astra AI</h1>
        <p>欢迎回来，请登录您的账户</p>
      </div>

      <div class="tabs">
        <div class="tab active" id="login-tab">登录</div>
        <div class="tab" id="register-tab">注册</div>
      </div>

      <form id="auth-form">
        <div class="form-group" id="username-group">
          <label>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            用户名
          </label>
          <input type="text" id="username" placeholder="请输入用户名" required />
        </div>

        <div class="form-group" id="email-group">
          <label>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
            邮箱
          </label>
          <input type="email" id="email" placeholder="you@example.com" required />
        </div>

        <div class="form-group">
          <label>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            密码
          </label>
          <input type="password" id="password" placeholder="至少6位" required />
        </div>

        <div class="forgot-password" id="forgot-password">
          <a href="#">忘记密码？</a>
        </div>

        <button type="submit" class="submit-btn" id="submit-btn">进入工作台</button>
      </form>

      <div class="error-message" id="error-message"></div>

      <div class="divider">
        <span>或</span>
      </div>

      <div class="switch-link" id="switch-link">
        还没有账户？<a href="#" id="switch-register">立即注册</a>
      </div>
    </div>

    <script src="./js/background-init.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        const loginTab = document.getElementById('login-tab');
        const registerTab = document.getElementById('register-tab');
        const usernameGroup = document.getElementById('username-group');
        const emailGroup = document.getElementById('email-group');
        const usernameInput = document.getElementById('username');
        const emailInput = document.getElementById('email');
        const submitBtn = document.getElementById('submit-btn');
        const switchLink = document.getElementById('switch-link');
        const errorMessage = document.getElementById('error-message');
        const form = document.getElementById('auth-form');
        const forgotPassword = document.getElementById('forgot-password');

        let isLogin = true;

        function showError(msg) {
          errorMessage.textContent = msg;
          errorMessage.classList.add('show');
          setTimeout(() => {
            errorMessage.classList.remove('show');
          }, 3000);
        }

        function hideError() {
          errorMessage.classList.remove('show');
        }

        loginTab.addEventListener('click', function() {
          isLogin = true;
          loginTab.classList.add('active');
          registerTab.classList.remove('active');
          usernameGroup.style.display = 'block';
          emailGroup.style.display = 'none';
          usernameInput.required = true;
          emailInput.required = false;
          usernameInput.placeholder = '用户名或邮箱';
          emailInput.placeholder = 'you@example.com';
          submitBtn.textContent = '进入工作台';
          switchLink.innerHTML = '还没有账户？<a href="#" id="switch-register">立即注册</a>';
          forgotPassword.style.display = 'block';
          hideError();
        });

        registerTab.addEventListener('click', function() {
          isLogin = false;
          registerTab.classList.add('active');
          loginTab.classList.remove('active');
          usernameGroup.style.display = 'block';
          emailGroup.style.display = 'block';
          usernameInput.required = true;
          emailInput.required = true;
          usernameInput.placeholder = '请输入用户名';
          emailInput.placeholder = 'you@example.com';
          submitBtn.textContent = '创建账户';
          switchLink.innerHTML = '已有账户？<a href="#" id="switch-login">立即登录</a>';
          forgotPassword.style.display = 'none';
          hideError();

        });

        switchLink.addEventListener('click', function(e) {
          if (e.target.id === 'switch-register') {
            e.preventDefault();
            registerTab.click();
          }

          if (e.target.id === 'switch-login') {
            e.preventDefault();
            loginTab.click();
          }
        });

        form.addEventListener('submit', async function(e) {
          e.preventDefault();
          hideError();

          const username = usernameInput.value.trim();
          const email = emailInput.value.trim();
          const password = document.getElementById('password').value;

          try {
            let response;
            if (isLogin) {
              response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify({ account: username, password })
              });
            } else {
              response = await fetch('/api/auth/register', {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify({ username, email, password })
              });
            }

            const data = await response.json();

            if (response.ok && data.success) {
              const user = data.user || {};
              const displayName = user.username || user.email || username || email;
              localStorage.setItem('nickname', displayName);
              localStorage.setItem('email', user.email || email || username);
              window.location.href = '/index.html';
            } else {
              showError(data.message || '操作失败，请重试');
            }
          } catch (error) {
            showError('网络错误，请稍后重试');
          }
        });

        loginTab.click();
      });
    </script>
  </body>
</html>
